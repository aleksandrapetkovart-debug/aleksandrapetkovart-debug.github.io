<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>AR Poster</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- MindAR (image tracking) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<style>
  a-scene {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
  }
</style>
<body>
  <div id="statusText" style="position: fixed; top: 12px; left: 12px; z-index: 9999; background: rgba(0,0,0,0.7); color: #fff; padding: 8px 10px; border-radius: 6px; font-family: Arial, sans-serif;">
    waiting for targets
  </div>
  <a-scene
    mindar-image="imageTargetSrc: targets.mind; maxTrack: 2;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      {# <video id="clip0" src="clip0.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="clip1" src="clip1.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video> #}
      <video id="vid1" src="vid1.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid12" src="vid2.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid13" src="vid3.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid14" src="vid4.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid15" src="vid5.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid16" src="vid6.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid17" src="vid7.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid18" src="vid8.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid19" src="vid9.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid110" src="vid10.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid111" src="vid11.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid112" src="vid12.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid113" src="vid13.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid114" src="vid14.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid115" src="vid15.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid116" src="vid16.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid117" src="vid17.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid118" src="vid18.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid119" src="vid19.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid120" src="vid20.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid121" src="vid21.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid122" src="vid22.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
      <video id="vid123" src="vid23.mp4" autoplay="false" loop="true" playsinline muted crossOrigin="anonymous"></video>
    </a-assets>

    <a-entity id="target0" mindar-image-target="targetIndex: 0">
      <a-video src="#vid1" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target1" mindar-image-target="targetIndex: 1">
      <a-video src="#vid12" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target2" mindar-image-target="targetIndex: 2">
      <a-video src="#vid13" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target3" mindar-image-target="targetIndex: 3">
      <a-video src="#vid14" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target4" mindar-image-target="targetIndex: 4">
      <a-video src="#vid15" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target5" mindar-image-target="targetIndex: 5">
      <a-video src="#vid16" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target6" mindar-image-target="targetIndex: 6">
      <a-video src="#vid17" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target7" mindar-image-target="targetIndex: 7">
      <a-video src="#vid18" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target8" mindar-image-target="targetIndex: 8">
      <a-video src="#vid19" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target9" mindar-image-target="targetIndex: 9">
      <a-video src="#vid110" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target10" mindar-image-target="targetIndex: 10">
      <a-video src="#vid111" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target11" mindar-image-target="targetIndex: 11">
      <a-video src="#vid112" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target12" mindar-image-target="targetIndex: 12">
      <a-video src="#vid113" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>
    
    <a-entity id="target13" mindar-image-target="targetIndex: 13">
      <a-video src="#vid114" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target14" mindar-image-target="targetIndex: 14">
      <a-video src="#vid115" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>
    
    <a-entity id="target15" mindar-image-target="targetIndex: 15">
      <a-video src="#vid116" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target16" mindar-image-target="targetIndex: 16">
      <a-video src="#vid117" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>
    
    <a-entity id="target17" mindar-image-target="targetIndex: 17">
      <a-video src="#vid118" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target18" mindar-image-target="targetIndex: 18">
      <a-video src="#vid119" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target19" mindar-image-target="targetIndex: 19">
      <a-video src="#vid120" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target20" mindar-image-target="targetIndex: 20">
      <a-video src="#vid121" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target21" mindar-image-target="targetIndex: 21">
      <a-video src="#vid122" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target22" mindar-image-target="targetIndex: 22">
      <a-video src="#vid123" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-camera position="0 0 0" look-controls="enabled: true"></a-camera>
  </a-scene>

  <script>
    const TARGET_COUNT = 23;
    const statusText = document.getElementById("statusText");

    const videoIdForTarget = (index) =>
      index === 0 ? "vid1" : `vid1${index + 1}`;

    const targets = Array.from({ length: TARGET_COUNT }, (_, i) =>
      document.getElementById(`target${i}`)
    );

    const videos = targets.map((_, i) =>
      document.getElementById(videoIdForTarget(i))
    );

    const targetVisible = Array(TARGET_COUNT).fill(false);

    const syncVideoState = (video, visible) => {
      if (!video) return;
      if (visible) {
        video.play();
      } else {
        video.pause();
        video.currentTime = 0;
      }
    };

    const syncClipState = () => {
      videos.forEach((video, i) => syncVideoState(video, targetVisible[i]));
    };

    targets.forEach((target, i) => {
      if (!target) return;

      target.addEventListener("targetFound", () => {
        targetVisible[i] = true;
        syncClipState();
        statusText.textContent = `target${i} found, playing video`;
      });

      target.addEventListener("targetLost", () => {
        targetVisible[i] = false;
        syncClipState();
        statusText.textContent = `target${i} lost, waiting for targets`;
      });
    });
  </script>
</body>
</html>
